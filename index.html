<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QWER Merge Game</title>
    <link rel="icon" type="image/webp" href="Asset/Image/website_icon.webp?v=1">
    <style>
        body { 
            margin: 0; background: #0f0f0f; display: flex; flex-direction: column; 
            align-items: center; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; 
            color: white; overflow: hidden; touch-action: none;
        }
        
        #game-header { text-align: center; margin: 5px 0; width: 100%; }
        #game-title-main { 
            font-size: 32px; font-weight: 900; margin: 0;
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #progression-bar {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); padding: 8px 15px;
            border-radius: 50px; margin: 5px auto; border: 1px solid #333; gap: 4px;
            max-width: 90%; flex-wrap: nowrap;
        }
        .prog-icon { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #555; flex-shrink: 0; }
        .prog-arrow { color: #00d2ff; font-size: 14px; font-weight: 900; margin: 0 2px; flex-shrink: 0; }

        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f0f 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        #menu-logo { width: 180px; height: auto; margin-bottom: 15px; }
        #menu-title { font-size: 42px; font-weight: 900; margin: 0; text-align: center; padding: 0 20px; }
        #menu-desc { font-size: 14px; color: #aaa; max-width: 320px; text-align: center; margin: 15px 0 30px 0; line-height: 1.4; padding: 0 10px; }
        .menu-footer { display: flex; gap: 10px; }
        
        #start-btn { padding: 12px 30px; font-size: 16px; background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%); border-radius: 8px; color: white; border: none; font-weight: bold; cursor: pointer; }
        #menu-lang-btn { padding: 12px 15px; background: #2c3e50; border: 1px solid #444; border-radius: 8px; color: white; cursor: pointer; font-size: 12px; }

        #ui-wrapper { display: flex; gap: 15px; opacity: 0; transition: opacity 0.5s; pointer-events: none; margin-top: 10px; }
        #ui-wrapper.active { opacity: 1; pointer-events: auto; }
        
        #game-container {
            position: relative; box-shadow: 0 0 40px #000; border-radius: 12px;
            overflow: hidden; width: 400px; height: 600px;
            background-image: url('Asset/Image/background.webp'); 
            background-size: cover; background-position: center;
            touch-action: none;
        }

        .sidebar { background: rgba(20, 20, 25, 0.95); padding: 15px; border-radius: 12px; text-align: center; width: 140px; border: 1px solid #333; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.5); padding: 6px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #444; }
        .score-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .score-val { font-size: 18px; color: #00d2ff; font-weight: bold; }
        
        .side-btn { width: 100%; font-size: 11px; padding: 8px; margin-top: 6px; background: #2c3e50; border-radius: 6px; color: white; border: 1px solid #444; cursor: pointer; }
        #song-display { color: #00d2ff; margin-top: 8px; font-size: 10px; font-style: italic; min-height: 40px; line-height: 1.3; }

        @media (max-width: 600px) {
            #game-title-main { font-size: 22px; }
            #ui-wrapper { 
                flex-direction: row; 
                justify-content: center; 
                align-items: flex-start;
                transform: scale(0.8); 
                transform-origin: top center;
            }
            #game-container { width: 300px; height: 500px; }
            .sidebar { width: 110px; padding: 10px; }
            .prog-icon { width: 14px; height: 14px; }
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div id="game-title-main">QWER CEREMONY MERGE</div>
        <div id="progression-bar"></div>
    </div>

    <div id="menu-overlay">
        <img id="menu-logo" src="Asset/Image/qwer_logo.webp"> 
        <h1 id="menu-title">QWER CEREMONY MERGE</h1>
        <p id="menu-desc">Drop the picture and they will merge to bigger picture when touched. Can you get to the final picture without crossing red line?</p>
        <div class="menu-footer">
            <button id="start-btn" onclick="startGame()">START GAME</button>
            <button id="menu-lang-btn" onclick="toggleLanguage()">English / 한국어</button>
        </div>
    </div>

    <div id="ui-wrapper">
        <div id="game-container"></div>
        
        <div class="sidebar">
            <button class="side-btn" style="background: #8e44ad;" id="btn-lang" onclick="toggleLanguage(event)">English / 한국어</button>
            <div class="score-box">
                <div class="score-label" id="lbl-score">SCORE</div>
                <div class="score-val" id="score-val">0</div>
            </div>
            <div class="score-box">
                <div class="score-label" id="lbl-highscore">HIGH SCORE</div>
                <div class="score-val" id="highscore-val" style="color: #fff;">0</div>
            </div>
            <div id="lbl-next" style="font-size: 10px; color: #888;">NEXT UP</div>
            <canvas id="next-canvas" width="60" height="60"></canvas>
            <div class="score-box" style="border-color: #e67e22;">
                <div class="score-label" id="lbl-best">ALL-TIME BEST</div>
                <img id="best-fruit-img" style="width:50px; height:50px; border-radius:50%; margin-top: 5px;">
            </div>
            <button class="side-btn" id="btn-theme" onclick="toggleTheme(event)">Switch Theme</button>
            <button class="side-btn" id="btn-music" onclick="nextSong(event)">Next Song</button>
            <div id="song-display">...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, World, Bodies, Events, Composite } = Matter;

        const mergeSfx = new Audio('Asset/Audio/sfx_pop.ogg');
        let currentLang = 'en'; 
        const trans = {
            en: { 
                title: "QWER CEREMONY MERGE", 
                desc: "Drop the picture and they will merge to bigger picture when touched. Can you get to the final picture without crossing red line?", 
                score: "SCORE", high: "HIGH SCORE", next: "NEXT UP", best: "ALL-TIME BEST", 
                theme: "Switch Theme", music: "Next Song", playing: "Now playing:", start: "START GAME",
                win: "YOU WIN!", loss: "GAME OVER", restart: "Tap to restart"
            },
            kr: { 
                title: "QWER 세레모니 머지", 
                desc: "사진을 떨어뜨려 보세요! 같은 사진끼리 닿으면 더 큰 사진으로 합쳐집니다. 레드라인을 넘지 않고 마지막 최종 단계까지 도달할 수 있을까요?", 
                score: "현재 점수", high: "최고 점수", next: "다음 단계", best: "최고 기록", 
                theme: "테마 변경", music: "곡 변경", playing: "현재 재생 중:", start: "게임 시작",
                win: "성공!", loss: "게임 오버", restart: "다시 시작하려면 탭하세요"
            }
        };

        const THEMES = [
            { icons: ['Asset/Image/white_Q1.webp', 'Asset/Image/white_W1.webp', 'Asset/Image/white_E1.webp', 'Asset/Image/white_R1.webp', 'Asset/Image/white_Q2.webp', 'Asset/Image/white_W2.webp', 'Asset/Image/white_E2.webp', 'Asset/Image/white_R2.webp', 'Asset/Image/white_QWER.webp'] },
            { icons: ['Asset/Image/dark_Q1.webp', 'Asset/Image/dark_W1.webp', 'Asset/Image/dark_E1.webp', 'Asset/Image/dark_R1.webp', 'Asset/Image/dark_Q2.webp', 'Asset/Image/dark_W2.webp', 'Asset/Image/dark_E2.webp', 'Asset/Image/dark_R2.webp', 'Asset/Image/dark_QWER.webp'] }
        ];

        const SONGS = [
            { name: "QWER - CEREMONY", kr: "QWER - 세레모니", url: 'Asset/Audio/ceremony.ogg' },
            { name: "QWER - BAD HABIT", kr: "QWER - BAD HABIT", url: 'Asset/Audio/bad_habit.ogg' },
            { name: "QWER - BANI BANI", kr: "QWER - 바니바니", url: 'Asset/Audio/banibani.ogg' },
            { name: "QWER - OUR VOYAGE", kr: "QWER - OUR VOYAGE", url: 'Asset/Audio/our_voyage.ogg' },
            { name: "QWER - PIONEER", kr: "QWER - PIONEER", url: 'Asset/Audio/pioneer.ogg' }
        ];

        const RADIUS_LEVELS = [15, 25, 35, 45, 60, 75, 90, 110, 135];
        const isMobile = window.innerWidth < 600;
        const width = isMobile ? 300 : 400;
        const height = isMobile ? 500 : 600;
        const gameOverLineY = 100;

        let themeIdx = 0, songIdx = 0, score = 0, highscore = 0, bestLvl = 0;
        let isGameOver = false, isWin = false, canDrop = true, gameStarted = false;
        let currentLvl = 0, nextLvl = 0, currentMouseX = width/2;

        const imageCache = THEMES.map(t => t.icons.map(src => {
            const img = new Image(); img.src = src; return img;
        }));

        const engine = Engine.create();
        const render = Render.create({
            element: document.getElementById("game-container"),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        Runner.run(Runner.create(), engine);
        const bgMusic = new Audio(); bgMusic.loop = true;

        function toggleLanguage(e) {
            if(e) e.stopPropagation();
            currentLang = currentLang === 'en' ? 'kr' : 'en';
            const l = trans[currentLang];
            document.getElementById('menu-title').innerText = l.title;
            document.getElementById('menu-desc').innerText = l.desc;
            document.getElementById('start-btn').innerText = l.start;
            document.getElementById('lbl-score').innerText = l.score;
            document.getElementById('lbl-highscore').innerText = l.high;
            document.getElementById('lbl-next').innerText = l.next;
            document.getElementById('lbl-best').innerText = l.best;
            document.getElementById('btn-theme').innerText = l.theme;
            document.getElementById('btn-music').innerText = l.music;
            updateSongDisplay();
        }

        function updateSongDisplay() {
            const l = trans[currentLang];
            const name = currentLang === 'en' ? SONGS[songIdx].name : SONGS[songIdx].kr;
            document.getElementById('song-display').innerHTML = `<strong>${l.playing}</strong><br>${name}`;
        }

        function updateProgressionBar() {
            const bar = document.getElementById('progression-bar');
            bar.innerHTML = '';
            THEMES[themeIdx].icons.forEach((src, i) => {
                const img = document.createElement('img'); img.src = src; img.className = 'prog-icon';
                bar.appendChild(img);
                if (i < 8) { const a = document.createElement('span'); a.className = 'prog-arrow'; a.innerText = '»'; bar.appendChild(a); }
            });
            document.getElementById('best-fruit-img').src = imageCache[themeIdx][bestLvl].src;
        }

        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('ui-wrapper').classList.add('active');
            gameStarted = true; resetGame();
            bgMusic.src = SONGS[songIdx].url; bgMusic.play().catch(()=>{});
            updateSongDisplay();
        }

        function resetGame() {
            World.clear(engine.world);
            const wallOpts = { isStatic: true, render: { visible: false }, friction: 0.5 };
            World.add(engine.world, [
                Bodies.rectangle(width/2, height + 5, width, 10, wallOpts),
                Bodies.rectangle(-5, height/2, 10, height, wallOpts),
                Bodies.rectangle(width+5, height/2, 10, height, wallOpts)
            ]);
            score = 0; isGameOver = false; isWin = false; canDrop = true;
            document.getElementById('score-val').innerText = "0";

            // --- TEST MODE FOR RESET ---
            currentLvl = Math.floor(Math.random() * 3);
            nextLvl = Math.floor(Math.random() * 3);
            //currentLvl = 7; // UNCOMMENT TO START WITH 8TH PIC
            //nextLvl = 7;    // UNCOMMENT TO START WITH 8TH PIC
            
            updateNextPreview();
            updateProgressionBar();
        }

        function spawnFruit(x, y, lvl, isMerge = false) {
            if (isGameOver || isWin) return;
            const fruit = Bodies.circle(x, y, RADIUS_LEVELS[lvl], { 
                label: lvl.toString(), restitution: 0.3, friction: 0.05, density: 0.001     
            });
            fruit.spawnTime = isMerge ? 0 : Date.now();
            World.add(engine.world, fruit);
            if (isMerge) { 
                mergeSfx.currentTime = 0; mergeSfx.play().catch(()=>{}); 
                if (lvl > bestLvl) { bestLvl = lvl; document.getElementById('best-fruit-img').src = imageCache[themeIdx][lvl].src; }
                if (lvl === 8) isWin = true;
            }
        }

        function updateNextPreview() {
            const ctx = document.getElementById('next-canvas').getContext('2d');
            ctx.clearRect(0, 0, 60, 60);
            const img = imageCache[themeIdx][nextLvl];
            ctx.save(); ctx.beginPath(); ctx.arc(30, 30, 25, 0, Math.PI * 2); ctx.clip();
            if (img.complete) ctx.drawImage(img, 5, 5, 50, 50); ctx.restore();
        }

        function isInsideGameBox(clientX, clientY) {
            const rect = document.getElementById('game-container').getBoundingClientRect();
            return (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom);
        }

        function getXCoord(clientX) {
            const rect = document.getElementById('game-container').getBoundingClientRect();
            const scale = isMobile ? 0.8 : 1;
            const x = (clientX - rect.left) / scale;
            const r = RADIUS_LEVELS[currentLvl];
            return Math.max(r, Math.min(width - r, x));
        }

        window.addEventListener('touchend', (e) => { 
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            if(!gameStarted) return;
            if(isGameOver || isWin) { resetGame(); return; }
            
            const touch = e.changedTouches[0];
            if(canDrop && isInsideGameBox(touch.clientX, touch.clientY)) {
                spawnFruit(currentMouseX, 40, currentLvl, false);
                canDrop = false; setTimeout(() => canDrop = true, 600);
                
                currentLvl = nextLvl;
                nextLvl = Math.floor(Math.random() * 3);
                //nextLvl = 7; // UNCOMMENT FOR CONSTANT 8TH PIC SPAWN
                
                updateNextPreview();
            }
        });

        window.addEventListener('touchstart', (e) => { 
            if(gameStarted && isInsideGameBox(e.touches[0].clientX, e.touches[0].clientY)) {
                currentMouseX = getXCoord(e.touches[0].clientX);
            }
        }, {passive:false});

        window.addEventListener('touchmove', (e) => { 
            if(gameStarted && isInsideGameBox(e.touches[0].clientX, e.touches[0].clientY)) {
                e.preventDefault(); 
                currentMouseX = getXCoord(e.touches[0].clientX);
            }
        }, {passive:false});

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            if(!gameStarted) return;
            if(isGameOver || isWin) { resetGame(); return; }
            if(canDrop && isInsideGameBox(e.clientX, e.clientY)) {
                spawnFruit(currentMouseX, 40, currentLvl, false);
                canDrop = false; setTimeout(() => canDrop = true, 600);
                
                currentLvl = nextLvl;
                nextLvl = Math.floor(Math.random() * 3);
                //nextLvl = 7; // UNCOMMENT FOR CONSTANT 8TH PIC SPAWN
                
                updateNextPreview();
            }
        });

        window.addEventListener('mousemove', (e) => { 
            if(gameStarted && isInsideGameBox(e.clientX, e.clientY)) {
                currentMouseX = getXCoord(e.clientX);
            }
        });

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                // 1. Check if both bodies still exist and aren't already marked for removal
                if (!p.bodyA || !p.bodyB || p.bodyA.isRemoving || p.bodyB.isRemoving) return;
        
                if (p.bodyA.label === p.bodyB.label && p.bodyA.label !== 'Unknown') {
                    const l = parseInt(p.bodyA.label);
                    
                    if (l < 8) {
                        // 2. Mark them as "removing" immediately so they don't trigger more collisions
                        p.bodyA.isRemoving = true;
                        p.bodyB.isRemoving = true;
        
                        const mx = (p.bodyA.position.x + p.bodyB.position.x) / 2;
                        const my = (p.bodyA.position.y + p.bodyB.position.y) / 2;
        
                        // 3. Remove from world
                        World.remove(engine.world, [p.bodyA, p.bodyB]);
        
                        // 4. Spawn the new one
                        spawnFruit(mx, my, l + 1, true);
        
                        // Update score
                        score += (l + 1) * 10;
                        document.getElementById('score-val').innerText = score;
                        if (score > highscore) {
                            highscore = score;
                            document.getElementById('highscore-val').innerText = highscore;
                        }
                    }
                }
            });
        });

        Events.on(render, 'afterRender', () => {
            if (!gameStarted) return;
            const ctx = render.context;
            
            ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(0, gameOverLineY); ctx.lineTo(width, gameOverLineY);
            ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            
            Composite.allBodies(engine.world).forEach(body => {
                if (!body.isStatic) {
                    const l = parseInt(body.label); const r = body.circleRadius; const img = imageCache[themeIdx][l];
                    ctx.save(); ctx.translate(body.position.x, body.position.y); ctx.rotate(body.angle);
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
                    if (img.complete) ctx.drawImage(img, -r, -r, r * 2, r * 2); ctx.restore();
                    
                    if (!isWin && body.spawnTime > 0 && (Date.now() - body.spawnTime) > 1500) {
                        if (body.position.y - r < gameOverLineY) isGameOver = true;
                    }
                }
            });

            if (canDrop && !isGameOver && !isWin) {
                const r = RADIUS_LEVELS[currentLvl]; const img = imageCache[themeIdx][currentLvl];
                ctx.save(); ctx.translate(currentMouseX, 40); ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
                if (img.complete) ctx.drawImage(img, -r, -r, r * 2, r * 2); ctx.restore();
            }

            if (isGameOver || isWin) {
                const l = trans[currentLang];
                ctx.fillStyle = "rgba(0,0,0,0.85)"; 
                ctx.fillRect(0, 0, width, height);
                
                ctx.textAlign = "center";
                ctx.fillStyle = isWin ? "#f1c40f" : "#ff4d4d"; 
                ctx.font = "bold 36px 'Segoe UI'";
                
                // 1. Draw Text First
                const textY = height / 2 - 100;
                ctx.fillText(isWin ? l.win : l.loss, width / 2, textY);

                if (isWin) {
                    // 2. Draw Square 9th Picture Below Text
                    const winImg = imageCache[themeIdx][8];
                    const size = 180; // Size of the square
                    const imgX = width / 2 - size / 2;
                    const imgY = textY + 30; // Spacing below "YOU WIN"
                    
                    if (winImg.complete) {
                        // Draw a simple border/frame
                        ctx.strokeStyle = "#f1c40f";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(imgX - 2, imgY - 2, size + 4, size + 4);
                        // Draw the square image
                        ctx.drawImage(winImg, imgX, imgY, size, size);
                    }
                    
                    // 3. Draw Restart Hint below the image
                    ctx.fillStyle = "white";
                    ctx.font = "16px 'Segoe UI'";
                    ctx.fillText(l.restart, width / 2, imgY + size + 40);
                } else {
                    // Standard Game Over restart hint
                    ctx.fillStyle = "white";
                    ctx.font = "16px 'Segoe UI'";
                    ctx.fillText(l.restart, width / 2, textY + 50);
                }
            }
        });

        function toggleTheme(e) { if(e) e.stopPropagation(); themeIdx = (themeIdx + 1) % THEMES.length; updateProgressionBar(); updateNextPreview(); }
        function nextSong(e) { if(e) e.stopPropagation(); songIdx = (songIdx + 1) % SONGS.length; bgMusic.src = SONGS[songIdx].url; bgMusic.play(); updateSongDisplay(); }

        updateProgressionBar();
    </script>
</body>
</html>
