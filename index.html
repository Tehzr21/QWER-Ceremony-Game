<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QWER Merge Game</title>
    <link rel="icon" type="image/x-icon" href="Asset/Image/website_icon.webp">
    <style>
        body { 
            margin: 0; background: #0f0f0f; display: flex; flex-direction: column; 
            align-items: center; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; 
            color: white; overflow: hidden; touch-action: none;
        }
        
        #game-header { text-align: center; margin: 10px 0; width: 100%; }
        #game-title-main { 
            font-size: 38px; font-weight: 900; margin: 0;
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #progression-bar {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); padding: 10px 20px;
            border-radius: 50px; margin-top: 10px; border: 1px solid #333; gap: 8px;
        }
        .prog-icon { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #555; }
        .prog-arrow { color: #00d2ff; font-size: 20px; font-weight: 900; margin: 0 4px; }

        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f0f 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.5s ease;
        }

        #menu-logo { width: 200px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(0,210,255,0.5)); }
        #menu-title { font-size: 52px; font-weight: 900; margin: 0; text-align: center; }
        #menu-desc { font-size: 16px; color: #aaa; max-width: 350px; text-align: center; margin: 15px 0 40px 0; line-height: 1.5; }
        .menu-footer { display: flex; gap: 15px; align-items: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; background: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%); }

        #ui-wrapper { display: flex; gap: 20px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        #ui-wrapper.active { opacity: 1; pointer-events: auto; }
        
        #game-container {
            position: relative; box-shadow: 0 0 50px #000; border-radius: 12px;
            overflow: hidden; width: 400px; height: 600px;
            background-image: url('Asset/Image/background.webp'); 
            background-size: cover; background-position: center;
        }

        canvas { cursor: none; background: transparent !important; touch-action: none; }
        
        .sidebar { background: rgba(20, 20, 25, 0.95); padding: 20px; border-radius: 12px; text-align: center; width: 160px; border: 1px solid #333; }
        .score-box { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #444; }
        .score-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .score-val { font-size: 22px; color: #00d2ff; font-weight: bold; }
        
        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; background: #3a7bd5; color: white; font-weight: bold; transition: 0.2s; }
        .side-btn { width: 100%; font-size: 12px; padding: 10px; margin-top: 8px; background: #2c3e50; }
        #song-display { color: #00d2ff; margin-top: 10px; font-size: 11px; font-style: italic; min-height: 45px; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 600px) {
            #game-title-main { font-size: 24px; }
            #progression-bar { padding: 5px 10px; transform: scale(0.8); margin-top: 0; }
            .prog-icon { width: 20px; height: 20px; }

            /* Side-by-side layout for phone */
            #ui-wrapper { 
                flex-direction: row; 
                justify-content: center; 
                align-items: flex-start;
                gap: 10px;
                transform: scale(0.85); /* Scales the whole game down to fit height */
                transform-origin: top center;
            }

            #game-container { 
                width: 280px; /* Slimmer for side-by-side */
                height: 480px; 
            }
            
            .sidebar { 
                width: 100px; 
                padding: 10px; 
            }
            .score-val { font-size: 16px; }
            .side-btn { font-size: 10px; padding: 6px; }
            #best-fruit-img { width: 40px !important; height: 40px !important; }
            #next-canvas { width: 50px !important; height: 50px !important; }
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div id="game-title-main">QWER CEREMONY MERGE</div>
        <div id="progression-bar"></div>
    </div>

    <div id="menu-overlay">
        <img id="menu-logo" src="Asset/Image/qwer_logo.webp" alt="Game Logo"> 
        <h1 id="menu-title">QWER CEREMONY MERGE</h1>
        <p id="menu-desc">Drop the icon down, they will merge into bigger icon when touched. Can you reach to the end and get the final picture while not crossing the red line?</p>
        <div class="menu-footer">
            <button id="start-btn" onclick="startGame()">START GAME</button>
            <button id="menu-lang-btn" onclick="toggleLanguage()">English / 한국어</button>
        </div>
    </div>

    <div id="ui-wrapper">
        <div id="game-container"></div>
        
        <div class="sidebar">
            <div class="score-box">
                <div class="score-label" id="lbl-score">SCORE</div>
                <div class="score-val" id="score-val">0</div>
            </div>
            <div class="score-box">
                <div class="score-label" id="lbl-highscore">HIGH</div>
                <div class="score-val" id="highscore-val" style="color: #fff;">0</div>
            </div>
            <div id="lbl-next" style="font-size: 10px; color: #888;">NEXT</div>
            <canvas id="next-canvas" width="80" height="80"></canvas>
            <div class="score-box" style="border-color: #e67e22;">
                <div class="score-label" id="lbl-best">BEST</div>
                <img id="best-fruit-img" style="width:60px; height:60px; border-radius:50%; margin-top: 5px;">
            </div>
            <button class="side-btn" id="btn-theme" onclick="toggleTheme()">Theme</button>
            <button class="side-btn" id="btn-music" onclick="nextSong()">Music</button>
            <div id="song-display">...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, World, Bodies, Events, Composite } = Matter;

        // Constants & Config
        const SFX_MERGE_URL = 'Asset/Audio/sfx_pop.ogg'; 
        const mergeSfx = new Audio(SFX_MERGE_URL);
        let currentLang = 'en'; 
        const trans = {
            en: { title: "QWER CEREMONY MERGE", desc: "Drop the icon down...", score: "SCORE", high: "HIGH", next: "NEXT", best: "BEST", theme: "Theme", music: "Music", win: "WIN!", winSub: "You reached the end!", loss: "GAME OVER", restart: "Tap to Restart", start: "START", playing: "Playing:" },
            kr: { title: "QWER 세레모니 머지", desc: "아이콘을 떨어뜨려 보세요...", score: "점수", high: "최고", next: "다음", best: "기록", theme: "테마", music: "음악", win: "성공!", winSub: "도달했습니다!", loss: "게임오버", restart: "다시 시작", start: "시작", playing: "재생:" }
        };

        const THEMES = [
            { icons: ['Asset/Image/white_Q1.webp', 'Asset/Image/white_W1.webp', 'Asset/Image/white_E1.webp', 'Asset/Image/white_R1.webp', 'Asset/Image/white_Q2.webp', 'Asset/Image/white_W2.webp', 'Asset/Image/white_E2.webp', 'Asset/Image/white_R2.webp', 'Asset/Image/white_QWER.webp'] },
            { icons: ['Asset/Image/dark_Q1.webp', 'Asset/Image/dark_W1.webp', 'Asset/Image/dark_E1.webp', 'Asset/Image/dark_R1.webp', 'Asset/Image/dark_Q2.webp', 'Asset/Image/dark_W2.webp', 'Asset/Image/dark_E2.webp', 'Asset/Image/dark_R2.webp', 'Asset/Image/dark_QWER.webp'] }
        ];

        const SONGS = [
            { name: "CEREMONY", url: 'Asset/Audio/ceremony.ogg' },
            { name: "BAD HABIT", url: 'Asset/Audio/bad_habit.ogg' },
            { name: "BANI BANI", url: 'Asset/Audio/banibani.ogg' },
            { name: "OUR VOYAGE", url: 'Asset/Audio/our_voyage.ogg' },
            { name: "PIONEER", url: 'Asset/Audio/pioneer.ogg' }
        ];

        const RADIUS_LEVELS = [15, 25, 35, 45, 60, 75, 90, 110, 135];
        // Dynamic detection for width
        const width = (window.innerWidth < 600) ? 280 : 400;
        const height = (window.innerWidth < 600) ? 480 : 600;
        const gameOverLineY = 100;

        let themeIdx = 0, songIdx = 0, score = 0, highscore = 0, bestLvl = 0;
        let isGameOver = false, isWin = false, canDrop = true, gameStarted = false;
        let currentLvl = 0, nextLvl = 0, currentMouseX = width/2;

        const imageCache = THEMES.map(t => t.icons.map(src => {
            const img = new Image(); img.src = src; return img;
        }));

        const engine = Engine.create();
        engine.world.gravity.y = 1; 
        const render = Render.create({
            element: document.getElementById("game-container"),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        Runner.run(Runner.create(), engine);
        const bgMusic = new Audio(); bgMusic.loop = true;

        function startGame() {
            document.getElementById('menu-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('ui-wrapper').classList.add('active');
            }, 500);
            gameStarted = true;
            resetGame();
            bgMusic.src = SONGS[songIdx].url; bgMusic.play().catch(()=>{});
            updateSongDisplay();
        }

        function resetGame() {
            World.clear(engine.world);
            const wallOpts = { isStatic: true, render: { visible: false }, friction: 0.5 };
            World.add(engine.world, [
                Bodies.rectangle(width/2, height + 5, width, 10, wallOpts),
                Bodies.rectangle(-5, height/2, 10, height, wallOpts),
                Bodies.rectangle(width+5, height/2, 10, height, wallOpts)
            ]);
            score = 0; isGameOver = false; isWin = false; canDrop = true;
            document.getElementById('score-val').innerText = "0";
            currentLvl = Math.floor(Math.random() * 3);
            nextLvl = Math.floor(Math.random() * 3);
            updateNextPreview();
            updateProgressionBar();
        }

        function spawnFruit(x, y, lvl, isMerge = false) {
            if (isGameOver || isWin) return;
            const fruit = Bodies.circle(x, y, RADIUS_LEVELS[lvl], { 
                label: lvl.toString(), restitution: 0.3, friction: 0.05, density: 0.001     
            });
            fruit.spawnTime = isMerge ? 0 : Date.now();
            World.add(engine.world, fruit);
            if (isMerge) { mergeSfx.currentTime = 0; mergeSfx.play().catch(()=>{}); if (lvl === 8) setTimeout(() => isWin = true, 500); }
            if (lvl > bestLvl) { bestLvl = lvl; document.getElementById('best-fruit-img').src = imageCache[themeIdx][lvl].src; }
        }

        function updateNextPreview() {
            const ctx = document.getElementById('next-canvas').getContext('2d');
            const cw = ctx.canvas.width;
            ctx.clearRect(0, 0, cw, cw);
            const img = imageCache[themeIdx][nextLvl];
            ctx.save(); ctx.beginPath(); ctx.arc(cw/2, cw/2, cw/2.5, 0, Math.PI * 2); ctx.clip();
            if (img.complete) ctx.drawImage(img, 0, 0, cw, cw); ctx.restore();
        }

        function updateProgressionBar() {
            const bar = document.getElementById('progression-bar');
            bar.innerHTML = '';
            THEMES[themeIdx].icons.forEach((src, i) => {
                const img = document.createElement('img'); img.src = src; img.className = 'prog-icon';
                bar.appendChild(img);
                if (i < 8) { const a = document.createElement('span'); a.className = 'prog-arrow'; a.innerText = '»'; bar.appendChild(a); }
            });
        }

        function getXCoord(e) {
            const rect = render.canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            // On mobile, the wrapper is scaled by 0.85, so we must adjust the coordinate logic
            const scale = (window.innerWidth < 600) ? 0.85 : 1;
            const x = (clientX - rect.left) / scale;
            const r = RADIUS_LEVELS[currentLvl];
            return Math.max(r, Math.min(width - r, x));
        }

        window.addEventListener('touchstart', (e) => { if(gameStarted) { currentMouseX = getXCoord(e); } }, {passive:false});
        window.addEventListener('touchmove', (e) => { if(gameStarted) { e.preventDefault(); currentMouseX = getXCoord(e); } }, {passive:false});
        window.addEventListener('touchend', (e) => { 
            if(!gameStarted || !canDrop || isGameOver || isWin) { if(isGameOver || isWin) resetGame(); return; }
            spawnFruit(currentMouseX, 40, currentLvl, false);
            canDrop = false; setTimeout(() => canDrop = true, 600);
            currentLvl = nextLvl; nextLvl = Math.floor(Math.random() * 3);
            updateNextPreview();
        });

        // Mouse fallbacks
        window.addEventListener('mousemove', (e) => currentMouseX = getXCoord(e));
        window.addEventListener('mousedown', (e) => {
            if(!gameStarted || !canDrop || isGameOver || isWin || e.target.tagName === 'BUTTON') return;
            spawnFruit(currentMouseX, 40, currentLvl, false);
            canDrop = false; setTimeout(() => canDrop = true, 600);
            currentLvl = nextLvl; nextLvl = Math.floor(Math.random() * 3);
            updateNextPreview();
        });

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                if (p.bodyA.label === p.bodyB.label && p.bodyA.label !== 'Unknown') {
                    const l = parseInt(p.bodyA.label);
                    if (l < 8) {
                        const mx = (p.bodyA.position.x + p.bodyB.position.x)/2;
                        const my = (p.bodyA.position.y + p.bodyB.position.y)/2;
                        World.remove(engine.world, [p.bodyA, p.bodyB]);
                        spawnFruit(mx, my, l + 1, true);
                        score += (l + 1) * 10; document.getElementById('score-val').innerText = score;
                    }
                }
            });
        });

        Events.on(render, 'afterRender', () => {
            if (!gameStarted) return;
            const ctx = render.context;
            ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(0, gameOverLineY); ctx.lineTo(width, gameOverLineY);
            ctx.strokeStyle = "red"; ctx.stroke(); ctx.setLineDash([]);
            
            Composite.allBodies(engine.world).forEach(body => {
                if (!body.isStatic) {
                    const l = parseInt(body.label); const r = body.circleRadius; const img = imageCache[themeIdx][l];
                    ctx.save(); ctx.translate(body.position.x, body.position.y); ctx.rotate(body.angle);
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
                    if (img.complete) ctx.drawImage(img, -r, -r, r * 2, r * 2); ctx.restore();
                    if (body.spawnTime > 0 && (Date.now() - body.spawnTime) > 1500 && (body.position.y - r) < gameOverLineY) isGameOver = true;
                }
            });

            if (canDrop && !isGameOver && !isWin) {
                const r = RADIUS_LEVELS[currentLvl]; const img = imageCache[themeIdx][currentLvl];
                ctx.save(); ctx.globalAlpha = 0.5;
                if (img.complete) ctx.drawImage(img, currentMouseX - r, 40 - r, r * 2, r * 2); ctx.restore();
            }

            if (isGameOver || isWin) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,width,height);
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.font = "bold 30px Arial"; ctx.fillText(isWin ? "WIN!" : "GAME OVER", width/2, height/2);
            }
        });

        function toggleLanguage() { currentLang = currentLang === 'en' ? 'kr' : 'en'; updateSongDisplay(); }
        function nextSong() { songIdx = (songIdx + 1) % SONGS.length; bgMusic.src = SONGS[songIdx].url; bgMusic.play(); updateSongDisplay(); }
        function updateSongDisplay() { document.getElementById('song-display').innerText = SONGS[songIdx].name; }
        function toggleTheme() { themeIdx = (themeIdx + 1) % THEMES.length; updateProgressionBar(); updateNextPreview(); }

        updateProgressionBar();
    </script>
</body>
</html>
